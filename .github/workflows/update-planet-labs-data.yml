name: Update Planet Labs Data

on:
  schedule:
    # Runs every Monday at 6:00 AM UTC (Sunday 11:00 PM MST)
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scikit-learn matplotlib

      - name: Fetch Planet Labs financial data
        run: python scripts/fetch_planet_labs_financials.py

      - name: Run price prediction model
        run: python scripts/pl_price_prediction_model.py

      - name: Commit and push updated data
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update Planet Labs (PL) data & predictions — $(date -u '+%Y-%m-%d')"
          git push
