name: Update Planet Labs Financial Data

on:
  schedule:
    # Runs every Monday at 6:00 AM UTC (Sunday 11:00 PM MST)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch Planet Labs financial data
        run: python fetch_planet_labs_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"
          git add data/
          # Only commit if there are changes
          git diff --staged --quiet || git commit -m "Update Planet Labs (PL) financial data - $(date -u '+%Y-%m-%d')"
          git push
